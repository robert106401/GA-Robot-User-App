<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ee"/>
      <stop offset="0.55" stop-color="#eef3f3"/>
      <stop offset="1" stop-color="#f9f6f1"/>
    </linearGradient>
    <linearGradient id="blackCup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171513"/>
      <stop offset="0.46" stop-color="#292521"/>
      <stop offset="1" stop-color="#080807"/>
    </linearGradient>
    <linearGradient id="blueCup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76d6de"/>
      <stop offset="0.48" stop-color="#22b7c4"/>
      <stop offset="1" stop-color="#0c8e9a"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8e2d8"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#433a31" flood-opacity="0.24"/>
    </filter>
    <pattern id="cupTexture" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="4.2" fill="#fff" opacity="0.08"/>
      <circle cx="13" cy="14" r="3.5" fill="#000" opacity="0.06"/>
    </pattern>
    <pattern id="qrPattern" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect width="48" height="48" fill="#f7f4ee"/>
      <rect x="4" y="4" width="12" height="12" fill="#171513"/>
      <rect x="32" y="4" width="12" height="12" fill="#171513"/>
      <rect x="4" y="32" width="12" height="12" fill="#171513"/>
      <rect x="21" y="8" width="5" height="5" fill="#171513"/>
      <rect x="26" y="20" width="6" height="6" fill="#171513"/>
      <rect x="18" y="30" width="7" height="7" fill="#171513"/>
      <rect x="34" y="27" width="4" height="12" fill="#171513"/>
      <rect x="24" y="39" width="8" height="5" fill="#171513"/>
    </pattern>
    <clipPath id="cupClipBlack">
      <path d="M885 252 C904 715 942 842 1080 842 C1218 842 1256 715 1275 252 Z"/>
    </clipPath>
    <clipPath id="cupClipBlue">
      <path d="M325 252 C344 715 382 842 520 842 C658 842 696 715 715 252 Z"/>
    </clipPath>
    <style>
      .font { font-family: Inter, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title { font-size: 52px; font-weight: 760; fill: #181512; letter-spacing: 0; }
      .subtitle { font-size: 23px; font-weight: 420; fill: #5b5248; letter-spacing: 0; }
      .small { font-size: 18px; font-weight: 520; letter-spacing: 0; }
      .micro { font-size: 13px; font-weight: 560; letter-spacing: 0; }
      .brand { font-size: 46px; font-weight: 760; letter-spacing: 0; }
      .cnMain { font-size: 30px; font-weight: 760; letter-spacing: 0; }
      .enMain { font-size: 19px; font-weight: 540; letter-spacing: 0; }
      .caption { font-size: 15px; font-weight: 600; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="155" cy="890" r="250" fill="#d7c4a2" opacity="0.18"/>
  <circle cx="1470" cy="175" r="240" fill="#6dcbd3" opacity="0.18"/>

  <g class="font">
    <text x="100" y="112" class="title">GA-Robot Cup Visual Concept</text>
    <text x="100" y="153" class="subtitle">用户运营导向：品牌识别 + 产品价值 + 扫码转化</text>

    <g transform="translate(1120 84)">
      <rect x="0" y="0" width="54" height="54" rx="12" fill="#171513"/>
      <rect x="72" y="0" width="54" height="54" rx="12" fill="#d8b978"/>
      <rect x="144" y="0" width="54" height="54" rx="12" fill="#24b9c6"/>
      <rect x="216" y="0" width="54" height="54" rx="12" fill="#f7f4ee" stroke="#d9d2c7"/>
      <text x="0" y="86" class="micro" fill="#5b5248">Matte Black</text>
      <text x="72" y="86" class="micro" fill="#5b5248">Champagne</text>
      <text x="144" y="86" class="micro" fill="#5b5248">Fresh Blue</text>
      <text x="216" y="86" class="micro" fill="#5b5248">Warm White</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="520" cy="869" rx="212" ry="34" fill="#372f28" opacity="0.18"/>
    <path d="M308 222 C308 196 335 188 520 188 C705 188 732 196 732 222 L732 257 C732 279 696 288 520 288 C344 288 308 279 308 257 Z" fill="url(#lid)"/>
    <ellipse cx="520" cy="223" rx="211" ry="35" fill="#fff9ef"/>
    <ellipse cx="520" cy="223" rx="184" ry="19" fill="#dcd5ca" opacity="0.65"/>
    <path d="M325 252 C344 715 382 842 520 842 C658 842 696 715 715 252 Z" fill="url(#blueCup)"/>
    <path d="M325 252 C344 715 382 842 520 842 C658 842 696 715 715 252 Z" fill="url(#cupTexture)" clip-path="url(#cupClipBlue)"/>
    <path d="M325 252 C344 715 382 842 520 842 C658 842 696 715 715 252 Z" fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="4"/>
  </g>

  <g class="font" text-anchor="middle">
    <text x="520" y="348" class="brand" fill="#ffffff">GA-Robot</text>
    <line x1="438" y1="368" x2="602" y2="368" stroke="#ffffff" stroke-width="2.5" opacity="0.78"/>
    <text x="520" y="417" class="cnMain" fill="#ffffff">今天的能量，自动续上</text>
    <text x="520" y="452" class="enMain" fill="#e9feff">Coffee, automatically happy.</text>

    <path d="M396 516 C436 492 460 512 486 492 C509 474 539 474 562 493 C590 516 620 491 650 519" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.72"/>
    <text x="520" y="558" class="caption" fill="#ffffff">你的日常智能咖啡师</text>
    <text x="520" y="587" class="caption" fill="#dcfbff">现磨咖啡 · 鲜奶制作 · 快速取杯</text>

    <g transform="translate(432 638)">
      <rect x="0" y="0" width="176" height="108" rx="18" fill="#ffffff" opacity="0.92"/>
      <rect x="16" y="16" width="76" height="76" fill="url(#qrPattern)"/>
      <text x="126" y="38" class="micro" fill="#118994">扫码解锁</text>
      <text x="126" y="62" class="micro" fill="#118994">下一杯</text>
      <text x="126" y="84" font-size="10" font-weight="650" fill="#5b5248">Rewards</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="1080" cy="869" rx="212" ry="34" fill="#372f28" opacity="0.18"/>
    <path d="M868 222 C868 196 895 188 1080 188 C1265 188 1292 196 1292 222 L1292 257 C1292 279 1256 288 1080 288 C904 288 868 279 868 257 Z" fill="url(#lid)"/>
    <ellipse cx="1080" cy="223" rx="211" ry="35" fill="#fff9ef"/>
    <ellipse cx="1080" cy="223" rx="184" ry="19" fill="#dcd5ca" opacity="0.65"/>
    <path d="M885 252 C904 715 942 842 1080 842 C1218 842 1256 715 1275 252 Z" fill="url(#blackCup)"/>
    <path d="M885 252 C904 715 942 842 1080 842 C1218 842 1256 715 1275 252 Z" fill="url(#cupTexture)" clip-path="url(#cupClipBlack)"/>
    <path d="M885 252 C904 715 942 842 1080 842 C1218 842 1256 715 1275 252 Z" fill="none" stroke="#d8b978" stroke-opacity="0.24" stroke-width="4"/>
  </g>

  <g class="font" text-anchor="middle">
    <text x="1080" y="348" class="brand" fill="#f2ddae">GA-Robot</text>
    <text x="1080" y="397" class="cnMain" fill="#fff7df">你的智能咖啡师</text>
    <text x="1080" y="431" class="enMain" fill="#d8b978">Fresh coffee, made in seconds.</text>

    <g transform="translate(958 500)" fill="none" stroke="#f2ddae" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 0 C8 18 13 47 38 58 C57 37 55 11 30 0 Z"/>
      <path d="M32 11 C31 27 35 40 43 52"/>
      <path d="M124 9 L169 9 L164 58 L129 58 Z"/>
      <path d="M137 9 L139 0 L158 0 L160 9"/>
      <path d="M250 6 C221 13 212 37 226 59 C252 55 267 31 250 6 Z"/>
      <path d="M227 48 C235 36 244 25 257 15"/>
    </g>
    <g class="font" text-anchor="middle">
      <text x="988" y="590" class="caption" fill="#fff7df">现磨咖啡</text>
      <text x="1080" y="590" class="caption" fill="#fff7df">鲜奶制作</text>
      <text x="1172" y="590" class="caption" fill="#fff7df">快速出杯</text>
    </g>

    <g transform="translate(988 640)">
      <rect x="0" y="0" width="184" height="118" rx="18" fill="#fff7df"/>
      <rect x="18" y="18" width="82" height="82" fill="url(#qrPattern)"/>
      <text x="140" y="41" class="micro" fill="#171513">扫码领</text>
      <text x="140" y="66" class="micro" fill="#171513">新人券</text>
      <text x="140" y="90" font-size="10" font-weight="650" fill="#8d6f34">Order · Points</text>
    </g>
  </g>

  <g class="font">
    <text x="338" y="925" font-size="24" font-weight="760" fill="#118994">蓝杯传播款</text>
    <text x="338" y="956" class="small" fill="#5b5248">面向校园、商场、轻办公：轻松亲和，强化分享与复购。</text>
    <text x="900" y="925" font-size="24" font-weight="760" fill="#171513">黑杯转化款</text>
    <text x="900" y="956" class="small" fill="#5b5248">面向写字楼、酒店、展会：品质科技感，明确扫码领券。</text>
  </g>
</svg>
